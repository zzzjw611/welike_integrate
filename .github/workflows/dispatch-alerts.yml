name: Dispatch Telegram Alerts (DISABLED)

# DISABLED 2026-05-07.
#
# The bot is now stateless — see web/app/api/telegram/webhook/route.ts. Users
# pull content on demand via /start → menu, instead of receiving scheduled
# pushes. There is no subscription state, so this hourly fan-out has no
# audience to fan out to.
#
# The schedule trigger was removed (was "0 * * * *"). workflow_dispatch is
# retained so the endpoint can still be hit manually if subscription state
# is reintroduced later.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call dispatch endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          WEB_BASE_URL: ${{ secrets.WEB_BASE_URL }}
        run: |
          if [ -z "$WEB_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET and WEB_BASE_URL must be configured as repo secrets"
            exit 1
          fi
          curl --fail --show-error --silent \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$WEB_BASE_URL/api/cron/dispatch-alerts"
          echo
