name: Generate AI News Daily

on:
  schedule:
    # 9:00 AM PT = 16:00 UTC (daylight time)
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to generate (YYYY-MM-DD). Leave empty for yesterday.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate AI News
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            node scripts/generate-news.mjs "${{ inputs.date }}"
          else
            node scripts/generate-news.mjs "$(date -d 'yesterday' '+%Y-%m-%d')"
          fi
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Commit and push generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/content/
          git diff --staged --quiet || git commit -m "chore: auto-generate AI news for $(date +'%Y-%m-%d')"
          git push
